<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PADEL Scoreboard Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>PADEL Scoreboard Controller</h1>

<div>
  <h2>Players</h2>
  <input id="team1Name" placeholder="Team 1">
  <input id="team2Name" placeholder="Team 2">
  <button id="updateNames">Update Names</button>
</div>

<div>
  <h2>Score</h2>
  <button id="point1">Point Team 1</button>
  <button id="point2">Point Team 2</button>
  <button id="undo">UNDO</button>
  <button id="reset">RESET MATCH</button>
</div>


<!-- ✅ FIREBASE SDK (MODULAR v9) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, update, onValue } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


// 🔥 Βάλε εδώ τα δικά σου Firebase config
const firebaseConfig = {
  apiKey: "ΒΑΛΕ_ΤΟ_ΔΙΚΟ_ΣΟΥ",
  authDomain: "ΒΑΛΕ_ΤΟ_ΔΙΚΟ_ΣΟΥ",
  databaseURL: "ΒΑΛΕ_ΤΟ_ΔΙΚΟ_ΣΟΥ",
  projectId: "ΒΑΛΕ_ΤΟ_ΔΙΚΟ_ΣΟΥ",
  storageBucket: "ΒΑΛΕ_ΤΟ_ΔΙΚΟ_ΣΟΥ",
  messagingSenderId: "ΒΑΛΕ_ΤΟ_ΔΙΚΟ_ΣΟΥ",
  appId: "ΒΑΛΕ_ΤΟ_ΔΙΚΟ_ΣΟΥ"
};


// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const stateRef = ref(db, "scoreboard");


// Default state
let state = {
  team1: "Team 1",
  team2: "Team 2",
  score1: 0,
  score2: 0
};


// Load state
onValue(stateRef, (snapshot) => {
  if(snapshot.exists()){
    state = snapshot.val();
  } else {
    set(stateRef, state);
  }
});


// Buttons
document.getElementById("updateNames").onclick = () => {
  state.team1 = document.getElementById("team1Name").value;
  state.team2 = document.getElementById("team2Name").value;
  update(stateRef, state);
};

document.getElementById("point1").onclick = () => {
  state.score1++;
  update(stateRef, state);
};

document.getElementById("point2").onclick = () => {
  state.score2++;
  update(stateRef, state);
};

document.getElementById("undo").onclick = () => {
  if(state.score1 > 0) state.score1--;
  if(state.score2 > 0) state.score2--;
  update(stateRef, state);
};

document.getElementById("reset").onclick = () => {
  state.score1 = 0;
  state.score2 = 0;
  update(stateRef, state);
};

</script>

</body>
</html>
