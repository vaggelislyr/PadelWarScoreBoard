<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Padel Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    button {
      padding: 15px 25px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #pointA { background: #2ecc71; }
    #pointB { background: #3498db; }
    #switchServe { background: #f39c12; }
    #toggleVisible { background: #9b59b6; }
    #reset { background: #e74c3c; }

    button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>

  <h1>🎾 Padel Controller</h1>

  <div>
    <button id="pointA">+ Point A</button>
    <button id="pointB">+ Point B</button>
  </div>

  <div>
    <button id="switchServe">Switch Serve</button>
  </div>

  <div>
    <button id="toggleVisible">ON / OFF</button>
    <button id="reset">Reset Match</button>
  </div>

  <!-- Firebase -->
  <script src="js/firebase-config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/controller.js"></script>

</body>
</html>
