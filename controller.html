<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Padel Scoreboard Controller</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0b1220;
color:white;
margin:0;
padding:20px;
}

h1{
margin-top:0;
font-size:24px;
}

.section{
background:#141d33;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
margin-bottom:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#1e6cff;
color:white;
font-weight:bold;
cursor:pointer;
margin:4px;
}

button.secondary{
background:#444;
}

button.red{
background:#d63939;
}

.rowButtons{
display:flex;
flex-wrap:wrap;
}

</style>

</head>
<body>

<h1>Padel Scoreboard Controller</h1>

<div class="section">

<label>Team A Players</label>
<input id="nameAInput" placeholder="Player1 / Player2">

<button onclick="updateNameA()">Update</button>

<label>Team B Players</label>
<input id="nameBInput" placeholder="Player1 / Player2">

<button onclick="updateNameB()">Update</button>

</div>


<div class="section">

<label>Sponsor (@)</label>
<input id="sponsorInput" placeholder="@sponsor">

<button onclick="updateSponsor()">Update</button>

</div>


<div class="section">

<div class="rowButtons">

<button onclick="addPoint('A')">Point A</button>
<button onclick="addPoint('B')">Point B</button>

<button onclick="switchServe()">Switch Serve</button>

<button onclick="undo()">Undo</button>

<button onclick="toggleScoreboard()">Show / Hide</button>

<button class="red" onclick="resetMatch()">Reset Match</button>

</div>

</div>


<div class="section">

<label>Timer</label>

<div class="rowButtons">

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/state.js"></script>
<script src="js/controller.js"></script>

</body>
</html>
