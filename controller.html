<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PADEL Scoreboard Controller</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

.section{
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}

button{
    padding:8px 12px;
    margin:4px;
    border:none;
    border-radius:6px;
    background:#334155;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#475569;
}

input{
    padding:6px;
    margin:4px;
    border-radius:6px;
    border:none;
    width:150px;
}

.previewWrapper{
    margin-top:20px;
    border:2px solid #334155;
    border-radius:8px;
    overflow:hidden;
}
</style>
</head>

<body>

<h1>🎾 PADEL Scoreboard Controller</h1>

<div class="section">
<h3>Players</h3>

<input id="p1" placeholder="Team 1">
<input id="p2" placeholder="Team 2">
<button onclick="updateNames()">Update Names</button>
</div>

<div class="section">
<h3>Score</h3>

<button onclick="point(1)">Point Team 1</button>
<button onclick="point(2)">Point Team 2</button>
<button onclick="undo()">UNDO</button>
<button onclick="resetMatch()">RESET MATCH</button>
</div>

<div class="section">
<h3>Scoreboard Visibility</h3>
<button onclick="toggleScoreboard()">ON / OFF</button>
</div>

<div class="previewWrapper">
<iframe src="obs.html" width="100%" height="300"></iframe>
</div>

<!-- IMPORTANT: SCRIPTS FROM /js FOLDER -->

<script src="js/state.js"></script>
<script src="js/firebase.js"></script>
<script src="js/obs.js"></script>
<script src="js/controller.js"></script>

</body>
</html>
