<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Padel Scoreboard</title>
<link rel="stylesheet" href="css/obs.css">
</head>
<body>

<div id="scoreboard">
  <div class="team">
    <div class="serve" id="serveA">🎾</div>
    <div class="names" id="namesA"></div>
    <div class="col" id="tieA"></div>
    <div class="col" id="setsA"></div>
    <div class="col" id="gamesA"></div>
    <div class="col score" id="scoreA"></div>
  </div>

  <div class="team">
    <div class="serve" id="serveB">🎾</div>
    <div class="names" id="namesB"></div>
    <div class="col" id="tieB"></div>
    <div class="col" id="setsB"></div>
    <div class="col" id="gamesB"></div>
    <div class="col score" id="scoreB"></div>
  </div>
</div>

<div id="golden">GOLDEN POINT</div>
<div id="timer"></div>

<script src="js/state.js"></script>
<script src="js/obs.js"></script>
</body>
</html>
