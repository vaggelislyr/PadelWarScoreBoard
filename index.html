<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Scoreboard</title>

<style>
:root{
  --bg:#0c1b1f;
  --panel:#12292f;
  --accent:#00ff9c;
  --text:#ffffff;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:var(--text);
}

.hidden{display:none}

/* ================= OBS SCOREBOARD ================= */

#scoreboard{
  position:fixed;
  top:20px;
  left:20px;
  background:var(--panel);
  border-radius:12px;
  padding:12px;
  min-width:520px;
  animation:slideIn .6s ease-out;
}

@keyframes slideIn{
  from{transform:translateX(-40px);opacity:0}
  to{transform:translateX(0);opacity:1}
}

.team{
  display:flex;
  align-items:center;
  margin:6px 0;
}

.serve{
  width:16px;
  margin-right:6px;
  font-size:14px;
}

.names{
  flex:1;
  font-weight:bold;
}

.col{
  width:60px;
  text-align:center;
}

.score{
  font-size:20px;
  font-weight:bold;
}

#golden{
  position:absolute;
  top:-40px;
  left:0;
  right:0;
  margin:auto;
  width:180px;
  background:gold;
  color:#000;
  font-weight:bold;
  text-align:center;
  padding:6px;
  border-radius:6px;
  animation:goldenSlide .5s ease-out;
}

@keyframes goldenSlide{
  from{transform:translateY(-20px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

/* ================= TIMER ================= */

#bottomBar{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  opacity:.9;
}

#timer{
  font-weight:bold;
}

/* ================= CONTROLLER ================= */

#controller{
  padding:20px;
}

.section{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:10px 14px;
  margin:4px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.primary{background:var(--accent)}
.danger{background:#ff4d4d}
.gray{background:#444;color:#fff}

input{
  padding:8px;
  border-radius:6px;
  border:none;
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<!-- ================= OBS VIEW ================= -->
<div id="scoreboard" class="hidden">

  <div id="golden" class="hidden">GOLDEN POINT</div>

  <div class="team">
    <div class="serve" id="serveA">🎾</div>
    <div class="names" id="namesA">Player A1 / Player A2</div>
    <div class="col" id="tbA">0</div>
    <div class="col" id="setA">0</div>
    <div class="col" id="gameA">0</div>
    <div class="col score" id="scoreA">0</div>
  </div>

  <div class="team">
    <div class="serve" id="serveB"></div>
    <div class="names" id="namesB">Player B1 / Player B2</div>
    <div class="col" id="tbB">0</div>
    <div class="col" id="setB">0</div>
    <div class="col" id="gameB">0</div>
    <div class="col score" id="scoreB">0</div>
  </div>

  <div id="bottomBar">
    <div id="eventTag">@padel.tournament</div>
    <div id="timer">00:00</div>
  </div>
</div>

<!-- ================= CONTROLLER VIEW ================= -->
<div id="controller" class="hidden">

  <div class="section">
    <b>Ονόματα</b>
    <input id="nA" placeholder="Ομάδα A – 2 παίκτες">
    <input id="nB" placeholder="Ομάδα B – 2 παίκτες">
  </div>

  <div class="section">
    <b>Σκορ</b><br>
    <button class="primary" onclick="point('A')">Πόντος A</button>
    <button class="primary" onclick="point('B')">Πόντος B</button>
  </div>

  <div class="section">
    <b>Σέρβις</b><br>
    <button class="gray" onclick="toggleServe()">Αλλαγή Σέρβις</button>
  </div>

  <div class="section">
    <b>Timer (λεπτά)</b>
    <input id="timeInput" placeholder="π.χ. 10">
    <br>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

</div>

<script>
const q = new URLSearchParams(location.search);
const view = q.get("view");

if(view==="obs") document.getElementById("scoreboard").classList.remove("hidden");
if(view==="controller") document.getElementById("controller").classList.remove("hidden");

/* ================= GAME LOGIC ================= */

const points=[0,15,30,40];
let score={A:0,B:0};
let games={A:0,B:0};
let sets={A:0,B:0};
let adCount=0;
let golden=false;
let serve="A";

function update(){
  scoreA.textContent = score.A===45?"AD":score.A;
  scoreB.textContent = score.B===45?"AD":score.B;
  gameA.textContent = games.A;
  gameB.textContent = games.B;
  setA.textContent = sets.A;
  setB.textContent = sets.B;

  serveA.textContent = serve==="A"?"🎾":"";
  serveB.textContent = serve==="B"?"🎾":"";

  namesA.textContent = nA.value || namesA.textContent;
  namesB.textContent = nB.value || namesB.textContent;
}

function resetScore(){
  score.A=0;score.B=0;
  adCount=0;golden=false;
  goldenBox(false);
}

function goldenBox(show){
  const g=document.getElementById("golden");
  g.classList.toggle("hidden",!show);
}

function point(t){
  const o = t==="A"?"B":"A";

  if(golden){
    games[t]++;
    resetScore();
    update();
    return;
  }

  if(score[t]===40 && score[o]===40){
    adCount++;
    if(adCount>=3){
      golden=true;
      goldenBox(true);
    }else{
      score[t]=45;
    }
  }
  else if(score[t]===45){
    games[t]++;
    resetScore();
  }
  else if(score[t]===40){
    games[t]++;
    resetScore();
  }
  else{
    score[t]=points[points.indexOf(score[t])+1];
  }
  update();
}

function toggleServe(){
  serve = serve==="A"?"B":"A";
  update();
}

/* ================= TIMER ================= */

let timer=null,seconds=0;

function startTimer(){
  if(timer) return;
  seconds = (parseInt(timeInput.value)||0)*60;
  timer=setInterval(()=>{
    if(seconds<=0){stopTimer();return;}
    seconds--;
    timerEl();
  },1000);
}

function stopTimer(){clearInterval(timer);timer=null;}
function resetTimer(){stopTimer();seconds=0;timerEl();}
function timerEl(){
  timer.textContent =
    String(Math.floor(seconds/60)).padStart(2,"0")+":"+
    String(seconds%60).padStart(2,"0");
}
</script>
</body>
</html>
