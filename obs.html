<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Padel OBS Overlay</title>

<style>

:root{
  --bg1:#030a18;
  --bg2:#07142a;
  --panel:#0c1d36;
  --line:#3fdcff55;
  --glow:#00e0ff55;
  --accent:#64f0ff;
  --gold:#ffd86b;
}

*{
box-sizing:border-box;
}

body{
margin:0;
background:transparent;
font-family:Orbitron,Arial,sans-serif;
color:white;
overflow:hidden;
}

#overlayWrapper{
position:absolute;
top:40px;
left:40px;
display:flex;
flex-direction:column;
gap:10px;
}

#scoreboard{

position:relative;

padding:16px 18px;

border-radius:22px;

background:
linear-gradient(180deg,var(--bg2),var(--bg1));

border:1px solid var(--line);

box-shadow:
0 0 20px var(--glow),
0 0 60px #0048ff22,
inset 0 0 20px #00cfff11;

backdrop-filter:blur(8px);

overflow:visible;

}

#scoreboard::before{
content:"";
position:absolute;
inset:8px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.04);
}

#scoreboardGrid{
display:grid;
grid-template-columns:34px auto 62px 62px 64px 98px;
grid-template-rows:48px 48px;
column-gap:12px;
row-gap:8px;
align-items:center;
}

.serveTrackCell{
grid-column:1;
grid-row:1 / span 2;
position:relative;
width:34px;
height:104px;
display:flex;
align-items:flex-start;
justify-content:center;
}

#serveTrack{
position:relative;
width:34px;
height:104px;
}

#serveTrack::before{
content:"";
position:absolute;
left:50%;
top:8px;
transform:translateX(-50%);
width:4px;
height:88px;
border-radius:999px;
background:linear-gradient(180deg,#64f0ff,#8b7bff);
box-shadow:0 0 10px #64f0ff;
}

#serveBall{
position:absolute;
left:50%;
transform:translateX(-50%);
top:6px;
font-size:22px;

filter:
drop-shadow(0 0 6px #fff)
drop-shadow(0 0 12px #64f0ff);

transition:
top .35s cubic-bezier(.22,.8,.24,1),
transform .25s ease;

animation:servePulse 1.3s infinite;

z-index:3;
}

#serveBall.toBottom{
top:66px;
}

@keyframes servePulse{
0%{transform:translateX(-50%) scale(1)}
50%{transform:translateX(-50%) scale(1.15)}
100%{transform:translateX(-50%) scale(1)}
}

.nameCell{

font-size:18px;
font-weight:700;

padding:8px 14px;

border-radius:12px;

background:linear-gradient(180deg,#122a4c,#08162a);

border:1px solid #3fdcff33;

box-shadow:
inset 0 0 14px #64f0ff11,
0 0 10px #00000033;

white-space:nowrap;

min-width:280px;

text-transform:uppercase;

letter-spacing:.4px;

}

.winnerName{
color:var(--gold);
text-shadow:0 0 10px var(--gold);
}

.loserName{
opacity:.45;
}

.setCell,
.gamesCell{

font-size:25px;
font-weight:800;

display:flex;
align-items:center;
justify-content:center;

height:40px;

border-radius:11px;

background:linear-gradient(180deg,#0c1d36,#071223);

border:1px solid #3fdcff33;

box-shadow:
inset 0 0 10px #64f0ff11;

}

.gamesCell{
border-color:#64f0ff55;
box-shadow:
inset 0 0 12px #64f0ff22,
0 0 10px #64f0ff22;
}

.pointsCell{

font-size:34px;
font-weight:900;

display:flex;
align-items:center;
justify-content:center;

height:46px;
min-width:98px;

border-radius:13px;

background:linear-gradient(180deg,#102849,#061122);

border:1px solid #64f0ff66;

box-shadow:
inset 0 0 16px #64f0ff22,
0 0 16px #64f0ff33;

transition:
transform .18s ease,
box-shadow .18s ease;

}

.pointsCell.scorePop{
transform:scale(1.1);
box-shadow:
inset 0 0 18px #64f0ff44,
0 0 24px #64f0ff88;
}

.hiddenSet{
display:none;
}

#goldenBanner,
#tiebreakBanner,
#winnerBanner{

position:absolute;

top:-30px;

left:50%;

transform:translateX(-50%) translateY(-12px);

padding:7px 16px;

font-size:13px;

font-weight:900;

border-radius:999px;

opacity:0;

transition:
opacity .25s ease,
transform .32s cubic-bezier(.22,.8,.24,1);

pointer-events:none;

text-transform:uppercase;

}

#goldenBanner{
background:linear-gradient(#ffe08a,#e8c55b);
color:black;
box-shadow:0 0 16px #e8c55b;
}

#tiebreakBanner{
background:linear-gradient(#78f0ff,#00c8ff);
color:black;
box-shadow:0 0 16px #00c8ff;
}

#winnerBanner{
background:linear-gradient(#ffe7a3,#ffd86b);
color:black;
box-shadow:0 0 20px #ffd86b;
}

#goldenBanner.active,
#tiebreakBanner.active,
#winnerBanner.active{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.goldenText{
color:#ffd86b;
text-shadow:0 0 8px #ffd86b;
}

#bottomBar{

display:flex;

justify-content:space-between;

align-items:center;

padding:8px 12px;

border-radius:16px;

background:linear-gradient(180deg,#081325,#050b17);

border:1px solid #3fdcff33;

box-shadow:
0 0 16px #64f0ff22,
inset 0 0 12px #64f0ff11;

}

#organizer{
font-size:17px;
font-weight:700;
white-space:nowrap;
text-transform:uppercase;
color:#9fc6d9;
}

#timer{
font-size:20px;
font-weight:900;
letter-spacing:1.4px;
white-space:nowrap;
text-shadow:0 0 6px #64f0ff;
}

</style>

</head>

<body>

<div id="overlayWrapper">

<div id="scoreboard">

<div id="goldenBanner">GOLDEN POINT</div>
<div id="tiebreakBanner">TIEBREAK</div>
<div id="winnerBanner">🏆 MATCH WINNER</div>

<div id="scoreboardGrid">

<div class="serveTrackCell">
<div id="serveTrack">
<span id="serveBall">🎾</span>
</div>
</div>

<div id="nameA" class="nameCell" style="grid-column:2; grid-row:1;">Player A1 / Player A2</div>
<div id="set2A" class="setCell hiddenSet" style="grid-column:3; grid-row:1;">0</div>
<div id="set1A" class="setCell hiddenSet" style="grid-column:4; grid-row:1;">0</div>
<div id="gamesA" class="gamesCell" style="grid-column:5; grid-row:1;">0</div>
<div id="pointsA" class="pointsCell" style="grid-column:6; grid-row:1;">0</div>

<div id="nameB" class="nameCell" style="grid-column:2; grid-row:2;">Player B1 / Player B2</div>
<div id="set2B" class="setCell hiddenSet" style="grid-column:3; grid-row:2;">0</div>
<div id="set1B" class="setCell hiddenSet" style="grid-column:4; grid-row:2;">0</div>
<div id="gamesB" class="gamesCell" style="grid-column:5; grid-row:2;">0</div>
<div id="pointsB" class="pointsCell" style="grid-column:6; grid-row:2;">0</div>

</div>

</div>

<div id="bottomBar">
<div id="organizer">@sponsor</div>
<div id="timer">00:00</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/state.js"></script>
<script src="js/obs.js"></script>

</body>
</html>
