<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>PadelWar Overlay</title>

<style>
body{
  margin:0;
  background:transparent;
  font-family: 'Segoe UI', sans-serif;
}

/* MAIN WRAPPER (top-left safe area) */
#overlayWrapper{
  position:absolute;
  top:40px;
  left:40px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ================= SCOREBOARD ================= */

#scoreboard{
  position:relative;
  display:flex;
  flex-direction:column;
  padding:18px 28px;
  border-radius:18px;
  background:linear-gradient(135deg,#0d1b2a,#1b263b 60%,#0d1b2a);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    inset 0 0 60px rgba(255,255,255,0.03);
  overflow:hidden;
  min-width:720px;
}

/* subtle gloss */
#scoreboard::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  background:linear-gradient(to bottom,rgba(255,255,255,0.08),transparent);
  pointer-events:none;
}

/* grid rows */
.playerRow{
  display:grid;
  grid-template-columns:auto auto 80px 80px 90px 110px;
  align-items:center;
  gap:18px;
  font-size:28px;
  padding:6px 0;
}

/* serve ball */
.serve{
  font-size:26px;
  width:24px;
  text-align:center;
  animation:float 1.2s ease-in-out infinite;
}

@keyframes float{
  0%{ transform:translateY(0);}
  50%{ transform:translateY(-6px);}
  100%{ transform:translateY(0);}
}

/* name column */
.playerName{
  font-weight:600;
  white-space:nowrap;
}

/* numbers */
.smallStat{
  text-align:center;
  opacity:0.85;
}

.points{
  font-size:40px;
  font-weight:700;
  text-align:center;
}

/* golden highlight */
.golden{
  color:#d4af37;
  text-shadow:0 0 12px rgba(212,175,55,0.6);
}

/* GOLDEN POPUP */
#goldenBanner{
  position:absolute;
  top:-60px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 26px;
  background:linear-gradient(135deg,#b8860b,#d4af37);
  color:#111;
  font-weight:700;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:all 0.4s cubic-bezier(.68,-0.6,.32,1.6);
  opacity:0;
}

#goldenBanner.active{
  top:-10px;
  opacity:1;
}

/* ================= BOTTOM BAR ================= */

#bottomBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 24px;
  border-radius:16px;
  background:linear-gradient(135deg,#0d1b2a,#1b263b);
  box-shadow:0 8px 25px rgba(0,0,0,0.6);
  min-width:720px;
  position:relative;
  overflow:hidden;
}

/* subtle net texture effect */
#bottomBar::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 8px
  );
  opacity:0.15;
  pointer-events:none;
}

#organizer{
  font-size:22px;
  font-weight:500;
}

#timer{
  font-size:26px;
  font-weight:600;
}
</style>
</head>

<body>

<div id="overlayWrapper">

  <div id="scoreboard">

    <div id="goldenBanner">GOLDEN POINT</div>

    <div class="playerRow">
      <div class="serve" id="serveA">🎾</div>
      <div class="playerName" id="nameA">Player A</div>
      <div class="smallStat" id="tbA">0</div>
      <div class="smallStat" id="setsA">0</div>
      <div class="smallStat" id="gamesA">0</div>
      <div class="points" id="pointsA">0</div>
    </div>

    <div class="playerRow">
      <div class="serve" id="serveB">🎾</div>
      <div class="playerName" id="nameB">Player B</div>
      <div class="smallStat" id="tbB">0</div>
      <div class="smallStat" id="setsB">0</div>
      <div class="smallStat" id="gamesB">0</div>
      <div class="points" id="pointsB">0</div>
    </div>

  </div>

  <div id="bottomBar">
    <div id="organizer">@Organizer</div>
    <div id="timer">00:00</div>
  </div>

</div>


<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/state.js"></script>
<script src="js/obs.js"></script>

</body>
</html>
