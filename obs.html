<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Padel OBS Overlay</title>
  <style>
    body{
      margin:0;
      background:transparent;
      font-family:Orbitron, Arial, sans-serif;
      color:#fff;
      overflow:hidden;
    }

    #overlayWrapper{
      position:absolute;
      top:40px;
      left:40px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    #scoreboard{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:14px 16px;
      border-radius:16px;
      background:linear-gradient(180deg,#0c1628 0%,#040a16 100%);
      border:1px solid rgba(0,180,255,0.25);
      box-shadow:
        0 0 30px rgba(0,140,255,0.15),
        inset 0 0 12px rgba(0,140,255,0.08);
    }

    .row{
      display:grid;
      grid-template-columns:30px auto 60px 60px 60px 90px;
      align-items:center;
      gap:12px;
    }

    .serveCell{
      display:flex;
      align-items:center;
      justify-content:center;
      width:30px;
    }

    .serveBall{
      font-size:22px;
      filter:
        drop-shadow(0 0 6px #fff)
        drop-shadow(0 0 10px #00cfff);
      animation:servePulse 1.4s infinite;
    }

    @keyframes servePulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.15);}
      100%{transform:scale(1);}
    }

    .nameCell{
      font-size:18px;
      font-weight:700;
      padding:6px 10px;
      border-radius:8px;
      background:linear-gradient(180deg,#162a4a,#0c1b32);
      box-shadow:inset 0 0 10px rgba(0,160,255,0.15);
      white-space:nowrap;
      width:max-content;
      min-width:260px;
      max-width:none;
    }

    .setCell,
    .gamesCell{
      font-size:26px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      height:38px;
      border-radius:8px;
      background:linear-gradient(180deg,#0b1c35,#071428);
      box-shadow:inset 0 0 10px rgba(0,200,255,0.1);
    }

    .pointsCell{
      font-size:34px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      height:44px;
      min-width:90px;
      border-radius:10px;
      background:linear-gradient(180deg,#0b1c35,#061122);
      box-shadow:
        inset 0 0 12px rgba(0,200,255,0.15),
        0 0 10px rgba(0,200,255,0.2);
    }

    .hiddenSet{
      display:none;
    }

    #goldenBanner,
    #tiebreakBanner,
    #winnerBanner{
      position:absolute;
      top:-22px;
      left:50%;
      transform:translateX(-50%);
      padding:6px 14px;
      font-size:14px;
      font-weight:800;
      border-radius:10px;
      opacity:0;
      transition:all .35s ease;
      pointer-events:none;
    }

    #goldenBanner{
      background:#e8c55b;
      color:#000;
      box-shadow:0 0 14px #e8c55b;
    }

    #tiebreakBanner{
      background:#00c8ff;
      color:#000;
      box-shadow:0 0 14px #00c8ff;
    }

    #winnerBanner{
      background:#ffd86b;
      color:#000;
      box-shadow:0 0 20px #ffd86b;
    }

    #goldenBanner.active,
    #tiebreakBanner.active,
    #winnerBanner.active{
      opacity:1;
    }

    .winnerName{
      color:#ffd86b;
      text-shadow:
        0 0 10px #ffd86b,
        0 0 20px #ffd86b;
    }

    .loserName{
      opacity:.55;
    }

    .goldenText{
      color:#e8c55b;
      text-shadow:
        0 0 8px rgba(232,197,91,0.45),
        0 0 16px rgba(232,197,91,0.35);
    }

    #bottomBar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:6px 12px;
      border-radius:12px;
      background:linear-gradient(180deg,#0a1425,#050b17);
      border:1px solid rgba(0,200,255,0.2);
      box-shadow:0 0 16px rgba(0,200,255,0.12);
    }

    #organizer{
      font-size:18px;
      font-weight:700;
      white-space:nowrap;
      width:max-content;
      max-width:none;
    }

    #timer{
      font-size:20px;
      font-weight:900;
      letter-spacing:1px;
      white-space:nowrap;
    }
  </style>
</head>
<body>

  <div id="overlayWrapper">
    <div id="scoreboard">

      <div id="goldenBanner">GOLDEN POINT</div>
      <div id="tiebreakBanner">TIEBREAK</div>
      <div id="winnerBanner">🏆 MATCH WINNER</div>

      <div class="row">
        <div class="serveCell"><span id="serveA" class="serveBall">🎾</span></div>
        <div id="nameA" class="nameCell">Player A1 / Player A2</div>
        <div id="set2A" class="setCell hiddenSet">0</div>
        <div id="set1A" class="setCell hiddenSet">0</div>
        <div id="gamesA" class="gamesCell">0</div>
        <div id="pointsA" class="pointsCell">0</div>
      </div>

      <div class="row">
        <div class="serveCell"><span id="serveB" class="serveBall">🎾</span></div>
        <div id="nameB" class="nameCell">Player B1 / Player B2</div>
        <div id="set2B" class="setCell hiddenSet">0</div>
        <div id="set1B" class="setCell hiddenSet">0</div>
        <div id="gamesB" class="gamesCell">0</div>
        <div id="pointsB" class="pointsCell">0</div>
      </div>

    </div>

    <div id="bottomBar">
      <div id="organizer">@sponsor</div>
      <div id="timer">00:00</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/state.js"></script>
  <script src="js/obs.js"></script>
</body>
</html>
