<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Padel OBS Overlay</title>
  <style>
    body{
      margin:0;
      background:transparent;
      font-family:Arial, Helvetica, sans-serif;
      color:#fff;
      overflow:hidden;
    }

    #overlayWrapper{
      position:absolute;
      top:40px;
      left:40px;
      display:flex;
      flex-direction:column;
      gap:10px;
      transform-origin:top left;
    }

    #scoreboard{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:16px 18px;
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(22,46,87,0.98) 0%, rgba(9,22,43,0.98) 100%);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.35);
      overflow:hidden;
    }

    #scoreboard::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.00) 28%);
      pointer-events:none;
    }

    .row{
      position:relative;
      display:grid;
      grid-template-columns: 26px auto 68px 68px 68px 90px;
      align-items:center;
      column-gap:14px;
      min-height:50px;
      z-index:1;
    }

    .serveCell{
      display:flex;
      align-items:center;
      justify-content:center;
      width:26px;
    }

    .serveBall{
      font-size:22px;
      line-height:1;
      filter:drop-shadow(0 0 6px rgba(255,255,0,0.35));
      animation:serveFloat 1.2s ease-in-out infinite;
    }

    @keyframes serveFloat{
      0%{ transform:translateY(0); }
      50%{ transform:translateY(-4px); }
      100%{ transform:translateY(0); }
    }

    .nameCell{
      min-width:260px;
      padding:8px 14px;
      border-radius:10px;
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
      font-size:19px;
      font-weight:700;
      white-space:nowrap;
      width:max-content;
      max-width:none;
      transition:opacity 0.25s ease, color 0.25s ease, text-shadow 0.25s ease;
    }

    .winnerName{
      color:#f0cf76;
      text-shadow:
        0 0 8px rgba(240,207,118,0.35),
        0 0 20px rgba(240,207,118,0.20);
    }

    .loserName{
      opacity:0.62;
    }

    .setCell,
    .gamesCell{
      display:flex;
      align-items:center;
      justify-content:center;
      height:44px;
      border-radius:10px;
      background:linear-gradient(180deg, rgba(0,0,0,0.18), rgba(255,255,255,0.03));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
      font-size:28px;
      font-weight:700;
      color:#f3f5fa;
    }

    .setCell.hiddenSet{
      display:none;
    }

    .pointsCell{
      display:flex;
      align-items:center;
      justify-content:center;
      height:50px;
      min-width:84px;
      border-radius:10px;
      background:linear-gradient(180deg, rgba(0,0,0,0.18), rgba(255,255,255,0.03));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
      font-size:38px;
      font-weight:800;
      letter-spacing:0.5px;
      color:#ffffff;
    }

    .goldenText{
      color:#e3b84d;
      text-shadow:
        0 0 8px rgba(227,184,77,0.35),
        0 0 18px rgba(227,184,77,0.20);
    }

    #goldenBanner,
    #tiebreakBanner,
    #winnerBanner{
      position:absolute;
      left:50%;
      transform:translateX(-50%) translateY(22px);
      top:-10px;
      padding:8px 18px;
      border-radius:12px;
      font-size:16px;
      font-weight:800;
      letter-spacing:0.6px;
      opacity:0;
      pointer-events:none;
      transition:
        transform 0.34s cubic-bezier(.2,.9,.2,1.15),
        opacity 0.28s ease;
      z-index:3;
      box-shadow:0 8px 18px rgba(0,0,0,0.35);
    }

    #goldenBanner{
      background:linear-gradient(180deg, #f0cf76 0%, #d6a838 100%);
      color:#2a1d00;
    }

    #tiebreakBanner{
      background:linear-gradient(180deg, #f5f7fb 0%, #dbe4f6 100%);
      color:#102544;
    }

    #winnerBanner{
      background:linear-gradient(180deg, #f7d981 0%, #d4af37 100%);
      color:#2a1d00;
    }

    #goldenBanner.active,
    #tiebreakBanner.active,
    #winnerBanner.active{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    #bottomBar{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      min-height:48px;
      padding:0 16px;
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(18,38,73,0.98) 0%, rgba(10,21,41,0.98) 100%);
      box-shadow:
        0 8px 20px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.06);
      overflow:hidden;
    }

    #bottomBar::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.045) 0px,
          rgba(255,255,255,0.045) 1px,
          transparent 1px,
          transparent 18px
        ),
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.045) 0px,
          rgba(255,255,255,0.045) 1px,
          transparent 1px,
          transparent 12px
        );
      opacity:0.16;
      pointer-events:none;
    }

    #organizer{
      position:relative;
      z-index:1;
      font-size:20px;
      font-weight:700;
      white-space:nowrap;
      width:max-content;
      max-width:none;
    }

    #timer{
      position:relative;
      z-index:1;
      font-size:24px;
      font-weight:800;
      letter-spacing:1px;
      white-space:nowrap;
    }
  </style>
</head>
<body>

  <div id="overlayWrapper">
    <div id="scoreboard">

      <div id="goldenBanner">GOLDEN POINT</div>
      <div id="tiebreakBanner">TIEBREAK</div>
      <div id="winnerBanner">🏆 MATCH WINNER</div>

      <div class="row">
        <div class="serveCell"><span id="serveA" class="serveBall">🎾</span></div>
        <div id="nameA" class="nameCell">Player A1 / Player A2</div>
        <div id="set2A" class="setCell hiddenSet">0</div>
        <div id="set1A" class="setCell hiddenSet">0</div>
        <div id="gamesA" class="gamesCell">0</div>
        <div id="pointsA" class="pointsCell">0</div>
      </div>

      <div class="row">
        <div class="serveCell"><span id="serveB" class="serveBall">🎾</span></div>
        <div id="nameB" class="nameCell">Player B1 / Player B2</div>
        <div id="set2B" class="setCell hiddenSet">0</div>
        <div id="set1B" class="setCell hiddenSet">0</div>
        <div id="gamesB" class="gamesCell">0</div>
        <div id="pointsB" class="pointsCell">0</div>
      </div>

    </div>

    <div id="bottomBar">
      <div id="organizer">@sponsor</div>
      <div id="timer">00:00</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/state.js"></script>
  <script src="js/obs.js"></script>
</body>
</html>
