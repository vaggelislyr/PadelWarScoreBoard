<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Padel OBS Overlay</title>

<style>
:root{
  --bg0: rgba(0,0,0,0.88);
  --bg1: rgba(10,10,10,0.96);
  --bg2: rgba(18,18,18,0.96);
  --bg3: rgba(28,28,28,0.94);

  --panelA: rgba(16,16,16,0.96);
  --panelB: rgba(6,6,6,0.98);

  --line1: rgba(255,255,255,0.42);
  --line2: rgba(255,255,255,0.18);
  --line3: rgba(255,255,255,0.08);

  --glow1: rgba(255,255,255,0.16);
  --glow2: rgba(255,255,255,0.08);

  --text: #ffffff;
  --soft: #d4d4d4;
  --dim: rgba(255,255,255,0.58);

  --gold1: #ffe7a3;
  --gold2: #ffd86b;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:transparent;
  font-family:Orbitron, Arial, sans-serif;
  color:var(--text);
  overflow:hidden;
}

#overlayWrapper{
  position:absolute;
  top:40px;
  left:40px;
  display:flex;
  flex-direction:column;
  gap:10px;
  width:max-content;
}

/* =========================
   TOP BANNERS
========================= */

#topBanners{
  position:absolute;
  top:-30px;
  left:0;
  width:100%;
  height:0;
  display:flex;
  justify-content:center;
  pointer-events:none;
  z-index:50;
}

#goldenBanner,
#tiebreakBanner,
#winnerBanner{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%) translateY(-12px);
  padding:7px 16px;
  font-size:13px;
  font-weight:900;
  letter-spacing:1px;
  text-transform:uppercase;
  white-space:nowrap;
  opacity:0;
  transition:
    opacity .25s ease,
    transform .32s cubic-bezier(.22,.8,.24,1);
  pointer-events:none;
  z-index:60;
  clip-path:polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%, 0% 12px);
}

#goldenBanner{
  background:linear-gradient(180deg, #ffe08a 0%, #e8c55b 100%);
  color:#000;
  box-shadow:
    0 0 16px rgba(232,197,91,0.70),
    0 0 34px rgba(232,197,91,0.22);
}

#tiebreakBanner{
  background:linear-gradient(180deg, #ffffff 0%, #cdcdcd 100%);
  color:#000;
  box-shadow:
    0 0 16px rgba(255,255,255,0.50),
    0 0 30px rgba(255,255,255,0.18);
}

#winnerBanner{
  background:linear-gradient(180deg, var(--gold1) 0%, var(--gold2) 100%);
  color:#000;
  box-shadow:
    0 0 18px rgba(255,216,107,0.75),
    0 0 38px rgba(255,216,107,0.24);
}

#goldenBanner.active,
#tiebreakBanner.active,
#winnerBanner.active{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* =========================
   MAIN BOARD
========================= */

#scoreboard{
  position:relative;
  width:max-content;
  padding:18px 20px 16px;
  background:
    linear-gradient(180deg, rgba(22,22,22,0.94) 0%, rgba(4,4,4,0.98) 100%);
  clip-path:polygon(
    42px 0%,
    calc(100% - 92px) 0%,
    calc(100% - 58px) 18px,
    100% 18px,
    100% calc(100% - 34px),
    calc(100% - 22px) 100%,
    90px 100%,
    62px calc(100% - 16px),
    0% calc(100% - 16px),
    0% 34px
  );
  overflow:visible;
}

#scoreboard::before{
  content:"";
  position:absolute;
  inset:0;
  clip-path:inherit;
  background:linear-gradient(135deg,
    rgba(255,255,255,0.95) 0%,
    rgba(190,190,190,0.92) 45%,
    rgba(120,120,120,0.92) 100%);
  filter:
    drop-shadow(0 0 6px rgba(255,255,255,0.60))
    drop-shadow(0 0 16px rgba(255,255,255,0.18))
    drop-shadow(0 0 30px rgba(255,255,255,0.10));
  z-index:0;
  pointer-events:none;
}

#scoreboard::after{
  content:"";
  position:absolute;
  inset:3px;
  clip-path:polygon(
    40px 0%,
    calc(100% - 90px) 0%,
    calc(100% - 57px) 17px,
    calc(100% - 3px) 17px,
    calc(100% - 3px) calc(100% - 33px),
    calc(100% - 22px) calc(100% - 3px),
    92px calc(100% - 3px),
    64px calc(100% - 18px),
    3px calc(100% - 18px),
    3px 34px
  );
  background:
    linear-gradient(180deg, rgba(18,18,18,0.96) 0%, rgba(4,4,4,0.98) 100%);
  box-shadow:
    inset 0 0 26px rgba(255,255,255,0.05),
    inset 0 0 70px rgba(255,255,255,0.02);
  z-index:0;
  pointer-events:none;
}

/* decorative frame lines */
.frameLine{
  position:absolute;
  z-index:2;
  pointer-events:none;
  background:linear-gradient(90deg, rgba(255,255,255,0.92), rgba(160,160,160,0.85));
  box-shadow:
    0 0 6px rgba(255,255,255,0.40),
    0 0 14px rgba(255,255,255,0.12);
  opacity:.92;
}

#lineTopLeft{
  top:22px;
  left:22px;
  width:132px;
  height:2px;
}

#lineTopCut{
  top:22px;
  left:168px;
  width:58px;
  height:2px;
  transform:skewX(-42deg);
  transform-origin:left center;
}

#lineBottomLeft{
  bottom:20px;
  left:24px;
  width:150px;
  height:2px;
}

#lineBottomCut{
  bottom:20px;
  left:186px;
  width:66px;
  height:2px;
  transform:skewX(40deg);
  transform-origin:left center;
}

#lineRightVert{
  top:42px;
  right:18px;
  width:2px;
  height:82px;
}

#lineRightMini{
  top:58px;
  right:32px;
  width:18px;
  height:2px;
}

.techBars{
  position:absolute;
  z-index:2;
  display:flex;
  gap:4px;
  pointer-events:none;
}

.techBars span{
  display:block;
  width:10px;
  height:2px;
  background:linear-gradient(90deg, rgba(255,255,255,0.90), rgba(150,150,150,0.70));
  box-shadow:0 0 7px rgba(255,255,255,0.25);
  opacity:.85;
}

#techTop{
  top:30px;
  right:106px;
}

#techBottom{
  bottom:28px;
  left:268px;
}

#rightStripes{
  position:absolute;
  top:36px;
  right:34px;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:5px;
  pointer-events:none;
}

#rightStripes span{
  display:block;
  width:3px;
  height:52px;
  background:linear-gradient(180deg, rgba(255,255,255,0.95), rgba(160,160,160,0.75));
  box-shadow:
    0 0 6px rgba(255,255,255,0.35),
    0 0 14px rgba(255,255,255,0.08);
  opacity:.85;
}

#rightStripes span:nth-child(1){ height:54px; }
#rightStripes span:nth-child(2){ height:60px; opacity:.70; }
#rightStripes span:nth-child(3){ height:66px; opacity:.56; }

/* =========================
   CONTENT
========================= */

#contentLayer{
  position:relative;
  z-index:3;
  padding:8px 10px 6px;
}

#scoreboardGrid{
  display:grid;
  grid-template-columns:34px auto 62px 62px 64px 100px;
  grid-template-rows:48px 48px;
  column-gap:12px;
  row-gap:8px;
  align-items:center;
}

/* =========================
   SERVE TRACK
========================= */

.serveTrackCell{
  grid-column:1;
  grid-row:1 / span 2;
  position:relative;
  width:34px;
  height:104px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
}

#serveTrack{
  position:relative;
  width:34px;
  height:104px;
}

#serveTrack::before{
  content:"";
  position:absolute;
  left:50%;
  top:8px;
  transform:translateX(-50%);
  width:4px;
  height:88px;
  border-radius:999px;
  background:linear-gradient(180deg, #ffffff 0%, #d8d8d8 55%, #888888 100%);
  box-shadow:
    0 0 8px rgba(255,255,255,0.55),
    0 0 18px rgba(255,255,255,0.10);
}

#serveTrack::after{
  content:"";
  position:absolute;
  left:50%;
  top:8px;
  transform:translateX(-50%);
  width:14px;
  height:88px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(150,150,150,0.06));
  filter:blur(5px);
}

#serveBall{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:6px;
  font-size:22px;
  filter:
    drop-shadow(0 0 6px #ffffff)
    drop-shadow(0 0 12px rgba(255,255,255,0.65))
    drop-shadow(0 0 22px rgba(255,255,255,0.16));
  transition:
    top .35s cubic-bezier(.22,.8,.24,1),
    transform .25s ease,
    filter .25s ease;
  animation:servePulse 1.35s infinite;
  z-index:3;
}

#serveBall.toBottom{
  top:66px;
}

@keyframes servePulse{
  0%{ transform:translateX(-50%) scale(1); }
  50%{ transform:translateX(-50%) scale(1.15); }
  100%{ transform:translateX(-50%) scale(1); }
}

/* =========================
   CELLS
========================= */

.nameCell{
  position:relative;
  min-width:282px;
  padding:8px 14px 8px 20px;
  border:1px solid rgba(255,255,255,0.18);
  background:
    linear-gradient(180deg, rgba(28,28,28,0.96) 0%, rgba(8,8,8,0.98) 100%);
  clip-path:polygon(14px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%, 0% 14px);
  font-size:18px;
  font-weight:700;
  letter-spacing:.4px;
  text-transform:uppercase;
  white-space:nowrap;
  color:var(--text);
  box-shadow:
    inset 0 0 16px rgba(255,255,255,0.03),
    0 0 10px rgba(0,0,0,0.24);
  transition:
    color .22s ease,
    opacity .22s ease,
    border-color .22s ease,
    box-shadow .22s ease;
}

.nameCell::before{
  content:"";
  position:absolute;
  left:9px;
  top:50%;
  transform:translateY(-50%);
  width:3px;
  height:64%;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,0.90), rgba(160,160,160,0.70));
  box-shadow:0 0 8px rgba(255,255,255,0.18);
}

.winnerName{
  color:var(--gold2);
  border-color:rgba(255,216,107,0.54);
  box-shadow:
    inset 0 0 18px rgba(255,216,107,0.06),
    0 0 16px rgba(255,216,107,0.14);
  text-shadow:
    0 0 8px rgba(255,216,107,0.36),
    0 0 18px rgba(255,216,107,0.18);
}

.loserName{
  opacity:.42;
}

.setCell,
.gamesCell,
.pointsCell{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-weight:800;
  color:#ffffff;
  background:
    linear-gradient(180deg, rgba(24,24,24,0.98) 0%, rgba(6,6,6,0.98) 100%);
  border:1px solid rgba(255,255,255,0.20);
  box-shadow:
    inset 0 0 12px rgba(255,255,255,0.03),
    0 0 8px rgba(255,255,255,0.04);
  clip-path:polygon(10px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%, 0% 10px);
  transition:
    transform .18s ease,
    box-shadow .18s ease,
    border-color .18s ease;
}

.setCell,
.gamesCell{
  height:40px;
  font-size:25px;
}

.gamesCell{
  border-color:rgba(255,255,255,0.28);
  box-shadow:
    inset 0 0 14px rgba(255,255,255,0.04),
    0 0 12px rgba(255,255,255,0.05);
}

.pointsCell{
  height:46px;
  min-width:100px;
  font-size:34px;
  font-weight:900;
  color:#ffffff;
  background:
    linear-gradient(180deg, rgba(34,34,34,0.98) 0%, rgba(8,8,8,0.98) 100%);
  border-color:rgba(255,255,255,0.40);
  box-shadow:
    inset 0 0 18px rgba(255,255,255,0.05),
    0 0 14px rgba(255,255,255,0.08);
  overflow:hidden;
}

.pointsCell::before{
  content:"";
  position:absolute;
  inset:-45% -22%;
  background:linear-gradient(120deg,
    transparent 0%,
    rgba(255,255,255,0.00) 35%,
    rgba(255,255,255,0.12) 50%,
    rgba(255,255,255,0.00) 65%,
    transparent 100%);
  transform:translateX(-110%);
  pointer-events:none;
}

.pointsCell.visualPulse::before{
  animation:scoreSweep .45s ease;
}

@keyframes scoreSweep{
  0%{ transform:translateX(-110%); }
  100%{ transform:translateX(110%); }
}

.pointsCell.scorePop,
.pointsCell.visualPulse{
  transform:scale(1.1);
  border-color:rgba(255,255,255,0.78);
  box-shadow:
    inset 0 0 18px rgba(255,255,255,0.08),
    0 0 20px rgba(255,255,255,0.18),
    0 0 36px rgba(255,255,255,0.08);
}

.setCell.visualPulse,
.gamesCell.visualPulse{
  transform:scale(1.08);
  border-color:rgba(255,255,255,0.55);
  box-shadow:
    inset 0 0 14px rgba(255,255,255,0.06),
    0 0 14px rgba(255,255,255,0.12);
}

.hiddenSet{
  display:none;
}

.goldenText{
  color:var(--gold2);
  text-shadow:
    0 0 8px rgba(255,216,107,0.32),
    0 0 18px rgba(255,216,107,0.14);
}

/* =========================
   BOTTOM BAR
========================= */

#bottomBar{
  position:relative;
  width:max-content;
  min-width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  padding:9px 14px;
  background:
    linear-gradient(180deg, rgba(18,18,18,0.96) 0%, rgba(4,4,4,0.98) 100%);
  clip-path:polygon(
    18px 0%,
    100% 0%,
    calc(100% - 10px) 100%,
    0% 100%,
    0% 12px
  );
  border:1px solid rgba(255,255,255,0.16);
  box-shadow:
    0 0 12px rgba(255,255,255,0.05),
    inset 0 0 10px rgba(255,255,255,0.03);
  overflow:hidden;
}

#bottomBar::before{
  content:"";
  position:absolute;
  top:0;
  left:-40%;
  width:40%;
  height:100%;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.08) 50%,
    transparent 100%);
  animation:bottomScan 6s linear infinite;
  pointer-events:none;
}

@keyframes bottomScan{
  0%{ left:-40%; }
  100%{ left:110%; }
}

#organizer{
  font-size:17px;
  font-weight:700;
  color:var(--soft);
  letter-spacing:.4px;
  text-transform:uppercase;
  white-space:nowrap;
}

#timer{
  font-size:20px;
  font-weight:900;
  letter-spacing:1.4px;
  white-space:nowrap;
  color:#ffffff;
  text-shadow:
    0 0 8px rgba(255,255,255,0.10);
}

/* =========================
   SPECIAL MODES
========================= */

#scoreboard.mode-tiebreak::before{
  background:linear-gradient(135deg,
    rgba(255,255,255,0.98) 0%,
    rgba(210,210,210,0.92) 45%,
    rgba(120,120,120,0.88) 100%);
  filter:
    drop-shadow(0 0 8px rgba(255,255,255,0.65))
    drop-shadow(0 0 18px rgba(255,255,255,0.18))
    drop-shadow(0 0 34px rgba(255,255,255,0.10));
}

#scoreboard.mode-golden::before,
#scoreboard.match-finished::before{
  background:linear-gradient(135deg,
    rgba(255,231,163,0.98) 0%,
    rgba(255,216,107,0.95) 55%,
    rgba(232,197,91,0.92) 100%);
  filter:
    drop-shadow(0 0 9px rgba(255,216,107,0.90))
    drop-shadow(0 0 20px rgba(255,216,107,0.32))
    drop-shadow(0 0 38px rgba(232,197,91,0.16));
}

#scoreboard.match-finished .nameCell::before{
  background:linear-gradient(180deg, var(--gold1), var(--gold2));
  box-shadow:0 0 10px rgba(255,216,107,0.46);
}

#scoreboard.match-finished .pointsCell,
#scoreboard.match-finished .gamesCell,
#scoreboard.match-finished .setCell{
  border-color:rgba(255,216,107,0.38);
  box-shadow:
    inset 0 0 16px rgba(255,216,107,0.06),
    0 0 12px rgba(255,216,107,0.08);
}
</style>
</head>
<body>

<div id="overlayWrapper">

  <div id="topBanners">
    <div id="goldenBanner">GOLDEN POINT</div>
    <div id="tiebreakBanner">TIEBREAK</div>
    <div id="winnerBanner">🏆 MATCH WINNER</div>
  </div>

  <div id="scoreboard">

    <div class="frameLine" id="lineTopLeft"></div>
    <div class="frameLine" id="lineTopCut"></div>
    <div class="frameLine" id="lineBottomLeft"></div>
    <div class="frameLine" id="lineBottomCut"></div>
    <div class="frameLine" id="lineRightVert"></div>
    <div class="frameLine" id="lineRightMini"></div>

    <div class="techBars" id="techTop">
      <span></span><span></span><span></span>
    </div>

    <div class="techBars" id="techBottom">
      <span></span><span></span><span></span>
    </div>

    <div id="rightStripes">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div id="contentLayer">
      <div id="scoreboardGrid">

        <div class="serveTrackCell">
          <div id="serveTrack">
            <span id="serveBall">🎾</span>
          </div>
        </div>

        <div id="nameA" class="nameCell" style="grid-column:2; grid-row:1;">Player A1 / Player A2</div>
        <div id="set2A" class="setCell hiddenSet" style="grid-column:3; grid-row:1;">0</div>
        <div id="set1A" class="setCell hiddenSet" style="grid-column:4; grid-row:1;">0</div>
        <div id="gamesA" class="gamesCell" style="grid-column:5; grid-row:1;">0</div>
        <div id="pointsA" class="pointsCell" style="grid-column:6; grid-row:1;">0</div>

        <div id="nameB" class="nameCell" style="grid-column:2; grid-row:2;">Player B1 / Player B2</div>
        <div id="set2B" class="setCell hiddenSet" style="grid-column:3; grid-row:2;">0</div>
        <div id="set1B" class="setCell hiddenSet" style="grid-column:4; grid-row:2;">0</div>
        <div id="gamesB" class="gamesCell" style="grid-column:5; grid-row:2;">0</div>
        <div id="pointsB" class="pointsCell" style="grid-column:6; grid-row:2;">0</div>

      </div>
    </div>
  </div>

  <div id="bottomBar">
    <div id="organizer">@sponsor</div>
    <div id="timer">00:00</div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/state.js"></script>
<script src="js/obs.js"></script>

<script>
(function(){
  const scoreboard = document.getElementById("scoreboard");

  const goldenBanner = document.getElementById("goldenBanner");
  const tiebreakBanner = document.getElementById("tiebreakBanner");
  const winnerBanner = document.getElementById("winnerBanner");

  const nameA = document.getElementById("nameA");
  const nameB = document.getElementById("nameB");

  const pointsA = document.getElementById("pointsA");
  const pointsB = document.getElementById("pointsB");
  const gamesA = document.getElementById("gamesA");
  const gamesB = document.getElementById("gamesB");
  const set1A = document.getElementById("set1A");
  const set1B = document.getElementById("set1B");
  const set2A = document.getElementById("set2A");
  const set2B = document.getElementById("set2B");

  function syncModes(){
    scoreboard.classList.toggle("mode-golden", goldenBanner.classList.contains("active"));
    scoreboard.classList.toggle("mode-tiebreak", tiebreakBanner.classList.contains("active"));

    const hasWinner =
      winnerBanner.classList.contains("active") ||
      nameA.classList.contains("winnerName") ||
      nameB.classList.contains("winnerName");

    scoreboard.classList.toggle("match-finished", hasWinner);
  }

  function pulse(el){
    if(!el) return;
    el.classList.remove("visualPulse");
    void el.offsetWidth;
    el.classList.add("visualPulse");
    setTimeout(() => el.classList.remove("visualPulse"), 260);
  }

  function watchText(el, doPulse){
    if(!el) return;
    let last = el.textContent;
    const observer = new MutationObserver(() => {
      const now = el.textContent;
      if(now !== last){
        last = now;
        if(doPulse) pulse(el);
      }
    });
    observer.observe(el, {
      childList:true,
      subtree:true,
      characterData:true
    });
  }

  function watchClass(el){
    if(!el) return;
    const observer = new MutationObserver(syncModes);
    observer.observe(el, { attributes:true, attributeFilter:["class"] });
  }

  watchClass(goldenBanner);
  watchClass(tiebreakBanner);
  watchClass(winnerBanner);
  watchClass(nameA);
  watchClass(nameB);

  watchText(pointsA, true);
  watchText(pointsB, true);
  watchText(gamesA, true);
  watchText(gamesB, true);
  watchText(set1A, true);
  watchText(set1B, true);
  watchText(set2A, true);
  watchText(set2B, true);

  syncModes();
})();
</script>

</body>
</html>
